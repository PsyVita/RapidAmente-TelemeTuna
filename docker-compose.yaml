services:
  # PostgreSQL 
  postgresdb:
    container_name: telemetry-postgresdb
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-db} 
    ports:
      - "5433:5432"
    volumes:
      # store data in a named volume that survives container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Grafana
  grafana:
    container_name: telemetry-grafana
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # set environment variables for Grafana to connect to PostgreSQL datasource
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      POSTGRES_DB: ${POSTGRES_DB:-db} 
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "300ms"
    volumes:
      # store data in a named volume that survives container restarts
      - grafana_data:/var/lib/grafana
      # provision Grafana with pre-configured datasources and dashboards
      - ./services/grafana/provisioning:/etc/grafana/provisioning
    # ensure Grafana starts after PostgreSQL is ready to accept connections
    depends_on:
      postgresdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Flyway
  flyway:
    image: flyway/flyway:latest
    # Tells Flyway to run the database migrations when the container starts. 
    command: migrate
    environment:
      # Tells Flyway where the db is located and how to connect to it. 
      FLYWAY_URL: jdbc:postgresql://postgresdb:5432/${POSTGRES_DB:-db}
      FLYWAY_USER: ${POSTGRES_USER:-user}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-password}
      # FLYWAY_CONNECT_RETRIES is set to 10 to allow Flyway to retry the connection to the PostgreSQL database multiple times in case the database is not yet ready when Flyway starts. 
      FLYWAY_CONNECT_RETRIES: "10"
    volumes:
      # Mount the local directory containing the SQL migration scripts to the Flyway container. 
      - ./services/database/migrations:/flyway/sql
    depends_on:
      postgresdb:
        condition: service_healthy

  # Node-RED
  node-red:
    container_name: telemetry-nodered
    build: ./services/nodered
    ports:
      - "1881:1880"
    environment:
      TZ: Asia/Bangkok
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    volumes:
      - ./services/nodered:/data
    depends_on:
      postgresdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1880/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Mosquitto MQTT Broker
  mosquitto:
    container_name: telemetry-mosquitto
    image: eclipse-mosquitto:latest
    ports:
      - "1884:1883"
    volumes:
      - ./services/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "healthcheck/ping", "-m", "ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # pgAdmin
  pgadmin:
    container_name: telemetry-pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-password}
    volumes:
      # remembers your saved server connections between restarts
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgresdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/misc/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  mosquitto_data:
  pgadmin_data: